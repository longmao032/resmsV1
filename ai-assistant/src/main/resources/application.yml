spring:
  application:
    name: ai-assistant
  autoconfigure:
    exclude:
      - com.alibaba.cloud.ai.autoconfigure.dashscope.DashScopeChatAutoConfiguration
      - org.springframework.ai.model.openai.autoconfigure.OpenAiEmbeddingAutoConfiguration
  config:
    import:
      - "optional:classpath:my-env.yml"
  ai:
    openai:
      api-key: ${DEEPSEEK_API_KEY}
      base-url: https://api.deepseek.com
      chat:
        options:
          model: deepseek-chat
      embedding:
        enabled: false  # 使用下方自定义 DashScope Embedding
    dashscope:
      api-key: ${DASHSCOPE_API_KEY}
      chat:
        enabled: false  # 仅用 DashScope Embedding，Chat 走 DeepSeek
      embedding:
        enabled: true
        options:
          model: text-embedding-v3
          dimensions: 1024
    vectorstore:
      pgvector:
        index-type: HNSW # HNSW(推荐) 或 IVFFlat 或 NONE
        distance-type: COSINE_DISTANCE # 距离算法: COSINE/EUCLIDEAN/INNER_PRODUCT
        dimensions: 1024 # 向量维度，需与 Embedding 模型匹配 (text-embedding-v3 为 1024)
        initialize-schema: true # 自动初始化表结构和扩展
        table-name: vector_store_v2 # 默认表名，因修改维度需创建新表
    chat:
      memory:
        jdbc:
          initialize-schema: always

  datasource:
    url: jdbc:postgresql://${PGSQL_HOST}/${PGSQL_DB}?currentSchema=public
    username: ${PGSQL_USERNAME}
    password: ${PGSQL_PASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
      connection-timeout: 30000

  # Redis
  data:
    redis:
      host: localhost
      port: 6379
      password:
      database: 0
      timeout: 5000ms
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 0
          max-wait: -1ms
server:
  port: 9090

remote:
  estate-system:
    target-url: ${TARGET_URL}
    target-user-name: ${TARGET_USERNAME}
    target-password: ${TARGET_PASSWORD}
    login-url: ${LOGIN_URL:/api/system/v1/auth/login}
    endpoints:
      list-houses: ${GET_HOUSE:/api/ai/v1/projects/list-all}
      customer-favorites: ${GET_FAVORITES:/api/ai/v1/customer/favorites}
      customer-history: ${GET_HISTORY:/api/ai/v1/customer/history}
      customer-appointments: ${GET_APPOINTMENTS:/api/ai/v1/customer/appointments}
      customer-profile: ${GET_PROFILE:/api/ai/v1/customer/profile}

search:
  pipeline:
    min-results: 3
    cache-ttl-minutes: 8
    recall-pool-size: 150
    result-limit: 5
  reranker:
    weight-tag: 0.25
    weight-persona: 0.20
    weight-semantic: 0.25
    weight-price: 0.15
    weight-location: 0.15
