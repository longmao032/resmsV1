spring:
  ai:
    openai:
      api-key: ${DEEPSEEK_API_KEY}
      base-url: https://api.deepseek.com
      chat:
        options:
          model: deepseek-chat
          temperature: 0.7
      embedding:
        enabled: false
    vectorstore:
      pgvector:
        index-type: HNSW
        distance-type: COSINE_DISTANCE
        dimensions: 384
        initialize-schema: true
        table-name: vector_store

  datasource:
    url: jdbc:postgresql://${PGSQL_HOST}/${PGSQL_DB}?currentSchema=public
    username: ${PGSQL_USERNAME}
    password: ${PGSQL_PASSWORD}
    driver-class-name: org.postgresql.Driver

  data:
    redis:
      host: localhost
      port: 6379
      database: 0
      timeout: 5000ms

server:
  port: 9090

logging:
  level:
    com.guang.aiassistant: DEBUG
